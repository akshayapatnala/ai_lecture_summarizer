<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Lecture Analyzer</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#0a0a0f;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:80%;
    max-width:900px;
    background:#111;
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 25px #00f2ff55;
}

h1{
    text-align:center;
    color:#00f2ff;
    text-shadow:0 0 10px #00f2ff;
}

.upload-box{
    text-align:center;
    margin-top:20px;
}

input[type="file"]{
    margin:15px;
    color:white;
}

button{
    padding:12px 25px;
    border:none;
    background:#00f2ff;
    color:black;
    font-weight:bold;
    border-radius:6px;
    cursor:pointer;
    box-shadow:0 0 15px #00f2ff;
}

button:hover{
    background:#00c3cc;
}

.result{
    margin-top:30px;
}

.box{
    background:#0d0d12;
    border:1px solid #00f2ff33;
    padding:15px;
    border-radius:8px;
    margin-top:10px;

    max-height:200px;
    overflow-y:auto;
}

.box::-webkit-scrollbar{
    width:6px;
}

.box::-webkit-scrollbar-thumb{
    background:#00f2ff;
    border-radius:10px;
}

label{
    color:#00f2ff;
    font-weight:bold;
}

</style>
</head>


<body>

<div class="container">

<h1>AI Lecture Analyzer</h1>

<div class="upload-box">

<input type="file" id="videoFile">

<br>

<button onclick="uploadFile()">Upload</button>

</div>


<div class="result">

<label>Transcript</label>
<div class="box" id="transcript"></div>

<br>

<label>Summary</label>
<div class="box" id="summary"></div>

</div>

</div>


<script>

async function uploadFile(){

const fileInput = document.getElementById("videoFile")

const file = fileInput.files[0]

if(!file){
alert("Please select a video")
return
}

const formData = new FormData()
formData.append("file",file)

document.getElementById("transcript").innerText="Processing..."
document.getElementById("summary").innerText="Generating summary..."

const response = await fetch("http://127.0.0.1:8000/upload",{
method:"POST",
body:formData
})

const data = await response.json()

document.getElementById("transcript").innerText=data.transcript
document.getElementById("summary").innerText=data.summary

}

</script>

</body>
</html>
